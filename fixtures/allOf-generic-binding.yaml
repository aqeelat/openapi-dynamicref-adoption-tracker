openapi: 3.1.0
info:
  title: DynamicRef allOf Generic Binding API
  version: 0.1.0
  license:
    name: MIT
    identifier: MIT
servers:
  - url: https://api.dynamicref.test
security: []
paths:
  /assets:
    get:
      summary: List assets
      operationId: listAssets
      tags: [Assets]
      responses:
        '200':
          description: Asset page
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AssetPaged'
        default:
          description: Error response
  /groups:
    get:
      summary: List groups
      operationId: listGroups
      tags: [Groups]
      responses:
        '200':
          description: Group page
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GroupPaged'
        default:
          description: Error response
components:
  schemas:
    Asset:
      type: object
      required: [id, name]
      properties:
        id:
          type: string
        name:
          type: string
    Group:
      type: object
      required: [id, label]
      properties:
        id:
          type: string
        label:
          type: string
    Paged:
      $id: https://example.com/schemas/Paged
      type: object
      required: [content, total_elements, total_pages]
      properties:
        content:
          type: array
          items:
            $dynamicRef: '#pagedContent'
        total_elements:
          type: integer
          minimum: 0
        total_pages:
          type: integer
          minimum: 0
    AssetPaged:
      $id: https://example.com/schemas/AssetPaged
      allOf:
        - $ref: '#/components/schemas/Paged'
        - $dynamicAnchor: pagedContent
          properties:
            content:
              type: array
              items:
                $ref: '#/components/schemas/Asset'
    GroupPaged:
      $id: https://example.com/schemas/GroupPaged
      allOf:
        - $ref: '#/components/schemas/Paged'
        - $dynamicAnchor: pagedContent
          properties:
            content:
              type: array
              items:
                $ref: '#/components/schemas/Group'
